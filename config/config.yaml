# =============================================================================
# sRNA-TAPS configuration file
# Generated by: srnataps init
# Edit all paths marked with <REQUIRED> before running.
# =============================================================================

project:
  name: "my_taps_project"
  outdir: "<REQUIRED: /path/to/output>"    # all pipeline output goes here

# ── Input ─────────────────────────────────────────────────────────────────────
input:
  fastq_dir: "<REQUIRED: /path/to/fastq>"  # directory with *.merged.fq.gz files
  samples_tsv: "samples.tsv"               # sample sheet (relative to config or absolute)

# ── Reference files ───────────────────────────────────────────────────────────
reference:
  genome_fa:    "<REQUIRED: /path/to/Homo_sapiens.GRCh38.dna.toplevel.fa>"
  gtf:          "<REQUIRED: /path/to/Homo_sapiens.GRCh38.112.gtf>"
  bowtie1_index: ""    # leave blank to auto-build from genome_fa into outdir/genome/

  # dbSNP VCF (optional — Layer 1 SNP filtering)
  # Pre-filter with bcftools:
  #   bcftools filter -i '(AF>=0.01) && ((REF="C" && ALT="T") || (REF="G" && ALT="A"))' \
  #     dbsnp_hg38.vcf.gz | bgzip > dbsnp_CT_GA_af01.vcf.gz && tabix -p vcf dbsnp_CT_GA_af01.vcf.gz
  dbsnp_vcf: ""        # leave blank to skip dbSNP Layer 1 filtering

# ── Adapter trimming ──────────────────────────────────────────────────────────
trimming:
  adapter: "TGGAATTCTCGGGTGCCAAGG"    # TruSeq small RNA 3' adapter
  min_length: 18                       # discard reads shorter than this after trimming
  max_length: 50                       # discard reads longer (likely adapter artefacts)

# ── Alignment (Bowtie1) ───────────────────────────────────────────────────────
# TAPS chemistry note: do NOT use bisulfite alignment mode.
# Bowtie1 -v mode is used (total mismatch tolerance, not quality-weighted)
# because TAPS C→T at modified sites are genuine mismatches against reference.
alignment:
  mismatches: 2          # -v 2: max total mismatches
  multimappers: 10       # -k 10: report up to N alignments per read
  max_multimappers: 100  # -m 100: discard reads mapping to >100 loci
  threads: 8

# ── Biotype splitting ─────────────────────────────────────────────────────────
biotype:
  priority:
    - miRNA
    - tRNA
    - piRNA
    - snoRNA
    - snRNA
    - rRNA
    - lncRNA
    - other

# ── SNP filtering ─────────────────────────────────────────────────────────────
# Three-layer polymorphism filtering applied BEFORE calling (not after).
# C→T SNPs are indistinguishable from TAPS m5C signal without these filters.
snp:
  min_af: 0.20           # Layer 2: min allele freq in no-treat BAM to call sample SNP
  min_cov: 10            # Layer 2: min coverage at site
  het_threshold: 0.40    # Layer 3: no-treat C→T rate above this → flag as het SNP

# ── TAPS modification calling ─────────────────────────────────────────────────
calling:
  min_base_quality: 20
  min_mapping_quality: 10
  background_rate: 0.005  # expected C→T rate for unmodified C (binomial null)
  pval_threshold: 0.05    # BH-adjusted p-value threshold for significant sites

  # Per-biotype minimum coverage thresholds
  min_coverage:
    rRNA:   10
    miRNA:   3
    tRNA:    3
    snoRNA:  3
    snRNA:   5
    piRNA:   5
    lncRNA:  5
    other:   5

  contexts:
    - ALL             # report all C contexts (CpG, CHH, CHG)
    # - CpG           # CpG only

# ── Benchmarking (enabled with --benchmark flag) ──────────────────────────────
benchmark:
  enabled: false      # set to true or use --benchmark flag
  tools:
    rastair:
      min_depth: 5
      min_mapq: 10
      min_baseq: 20
    astair:
      min_depth: 3
      min_mapq: 10
      min_baseq: 20
      context: all
    bismark:
      bismark_index: ""    # leave blank to auto-build into outdir/benchmark/bismark_index/

# ── SLURM cluster settings ────────────────────────────────────────────────────
slurm:
  partition: "compute"
  account: ""             # leave blank if not required
  mail_user: ""           # email for job notifications
  default_resources:
    cpus_per_task: 8
    mem_mb: 32000
    runtime: 240          # minutes

  # Per-rule resource overrides
  rule_resources:
    rule_index:
      cpus_per_task: 20
      mem_mb: 64000
      runtime: 720
    rule_align:
      cpus_per_task: 12
      mem_mb: 40000
      runtime: 480
    rule_call:
      cpus_per_task: 8
      mem_mb: 40000
      runtime: 480
    rule_benchmark:
      cpus_per_task: 16
      mem_mb: 64000
      runtime: 1440

# ── Output structure ──────────────────────────────────────────────────────────
# All paths are relative to project.outdir
output:
  fastqc:    "02.fastqc"
  trimmed:   "03.trimGalore"
  genome:    "04a.genome"
  aligned:   "04b.aligned"
  biotypes:  "05.biotype_bams"
  snp:       "06.snp_resources"
  calls:     "07.taps_calls"
  benchmark: "08.benchmark"
  compare:   "09.compare"
  logs:      "logs"
  report:    "report"
