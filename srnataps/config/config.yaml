# =============================================================================
# sRNA-TAPS configuration file
# Generated by: srnataps init
# Edit all paths marked with <REQUIRED> before running.
# =============================================================================

project:
  name: "my_taps_project"
  outdir: "<REQUIRED: /path/to/output>"    # all pipeline output goes here

# ── Input ─────────────────────────────────────────────────────────────────────
input:
  fastq_dir: "<REQUIRED: /path/to/fastq>"  # directory with *.merged.fq.gz files
  samples_tsv: "samples.tsv"               # sample sheet (relative to config or absolute)

# ── Reference files ───────────────────────────────────────────────────────────
reference:
  species:      "human" # run `srnataps species` to list supported values
  ensembl_release: 112
  genome_fa:    ""      # blank: derive path and download from Ensembl
  gtf:          ""      # blank: derive path and download from Ensembl
  bowtie1_index: ""     # blank: derive index prefix from species/assembly

  # dbSNP VCF (optional — Layer 1 SNP filtering)
  # Pre-filter with bcftools:
  #   bcftools filter -i '(AF>=0.01) && ((REF="C" && ALT="T") || (REF="G" && ALT="A"))' \
  #     dbsnp_hg38.vcf.gz | bgzip > dbsnp_CT_GA_af01.vcf.gz && tabix -p vcf dbsnp_CT_GA_af01.vcf.gz
  dbsnp_vcf: ""        # leave blank to skip dbSNP Layer 1 filtering

# ── Adapter trimming ──────────────────────────────────────────────────────────
trimming:
  adapter: "TGGAATTCTCGGGTGCCAAGG"    # TruSeq small RNA 3' adapter
  min_length: 18                       # discard reads shorter than this after trimming

# ── Alignment (Bowtie1) ───────────────────────────────────────────────────────
# Three-letter Bowtie1 neutralizes TAPS conversions during alignment, then
# restores the original read sequence before C-to-T calling.
alignment:
  strategy: "three_letter" # three_letter (recommended) or standard
  strand: "both"         # both genomic strands; restrict only for special protocols
  mode: "seed"
  mismatches: 1          # Bowtie1 -n seed mismatch ceiling
  seed_length: 10        # short seed tolerates TAPS conversions elsewhere
  max_mismatch_quality: 100
  multimappers: 1
  max_multimappers: null # avoid exhaustive -m searches on repetitive RNAs
  best_strata: false
  threads: 8

# ── Biotype splitting ─────────────────────────────────────────────────────────
biotype:
  priority:
    - miRNA
    - tRNA
    - piRNA
    - snoRNA
    - snRNA
    - rRNA
    - lncRNA
    - other

# ── SNP filtering ─────────────────────────────────────────────────────────────
# Three-layer polymorphism filtering applied BEFORE calling (not after).
# C→T SNPs are indistinguishable from TAPS m5C signal without these filters.
snp:
  min_af: 0.20           # Layer 2: min allele freq in no-treat BAM to call sample SNP
  min_cov: 10            # Layer 2: min coverage at site
  het_threshold: 0.40    # Layer 3: no-treat C→T rate above this → flag as het SNP

# ── TAPS modification calling ─────────────────────────────────────────────────
calling:
  min_base_quality: 20
  min_mapping_quality: 10
  background_rate: 0.005  # expected C→T rate for unmodified C (binomial null)
  pval_threshold: 0.05    # BH-adjusted p-value threshold for significant sites

  # Per-biotype minimum coverage thresholds
  min_coverage:
    rRNA:   10
    miRNA:   3
    tRNA:    3
    snoRNA:  3
    snRNA:   5
    piRNA:   5
    lncRNA:  5
    other:   5

  contexts:
    - ALL             # report all C contexts (CpG, CHH, CHG)
    # - CpG           # CpG only

# Condition-level evidence analysis. Requires treat, pb_ctrl, and no_treat
# samples for each analysed cell line. The discovery tier uses unbiased
# beta-binomial testing; stringent thresholds are intentionally configurable.
condition_analysis:
  enabled: true
  pooled_min_coverage: 1
  test_min_coverage: 5
  minimum_replicates: 3
  minimum_delta: 0.10
  discovery_max_padj: 0.05
  stringent_max_padj: 1.0e-20
  stringent_min_coverage: 5

# ── Benchmarking (enabled with --benchmark flag) ──────────────────────────────
benchmark:
  enabled: false      # set to true or use --benchmark flag
  tools:
    rastair:
      min_depth: 5
      min_mapq: 10
      min_baseq: 20
    astair:
      min_depth: 3
      min_mapq: 10
      min_baseq: 20
      context: all
      # Path to a separate conda env for asTair (its deps can conflict with the
      # main env). Leave blank to use `astair` from the active env / PATH.
      # Example: astair_env: "/path/to/conda/envs/astair_env"
      astair_env: ""
    bismark:
      bismark_index: ""    # leave blank to auto-build into outdir/benchmark/bismark_index/

# ── SLURM cluster settings ────────────────────────────────────────────────────
slurm:
  partition: "compute"
  account: ""             # leave blank if not required
  mail_user: ""           # email for job notifications
  default_resources:
    cpus_per_task: 8
    mem_mb: 32000
    runtime: 240          # minutes

  # Per-rule resource overrides
  rule_resources:
    rule_index:
      cpus_per_task: 20
      mem_mb: 64000
      runtime: 720
    rule_align:
      cpus_per_task: 12
      mem_mb: 40000
      runtime: 480
    rule_call:
      cpus_per_task: 8
      mem_mb: 40000
      runtime: 480
    rule_benchmark:
      cpus_per_task: 16
      mem_mb: 64000
      runtime: 1440

# ── Output structure ──────────────────────────────────────────────────────────
# All paths are relative to project.outdir
output:
  fastqc:    "02.fastqc"
  trimmed:   "03.trimGalore"
  genome:    "04a.genome"
  aligned:   "04b.aligned"
  biotypes:  "05.biotype_bams"
  snp:       "06.snp_resources"
  calls:     "07.taps_calls"
  pooled_calls: "07b.pooled_calls"
  control_contrast: "07c.control_contrast"
  replicate_calls: "07d.replicate_calls"
  stringent_calls: "07e.stringent_calls"
  evidence_audit: "10.evidence_audit"
  benchmark: "08.benchmark"
  compare:   "09.compare"
  logs:      "logs"
  report:    "report"
