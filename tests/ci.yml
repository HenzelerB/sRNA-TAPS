name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  release:
    types: [published]

jobs:

  # ════════════════════════════════════════════════════════════════════════════
  # Lint and style
  # ════════════════════════════════════════════════════════════════════════════
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint tools
        run: pip install flake8 black

      - name: flake8
        run: flake8 srnataps/ --max-line-length=100 --exclude=__pycache__

      - name: black (check only)
        run: black --check srnataps/


  # ════════════════════════════════════════════════════════════════════════════
  # Unit + integration tests
  # ════════════════════════════════════════════════════════════════════════════
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            bowtie \
            samtools \
            bcftools \
            tabix \
            fastqc

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install "setuptools<72"
          pip install -e ".[dev]"

      - name: Install asTair with correct setuptools
        run: |
          pip install astair
          pip install "setuptools<72" --force-reinstall

      - name: Run tests
        run: |
          pytest tests/ \
            --cov=srnataps \
            --cov-report=xml \
            --cov-report=term-missing \
            -m "not slow and not integration" \
            -v

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          file: coverage.xml
          fail_ci_if_error: false


  # ════════════════════════════════════════════════════════════════════════════
  # Build distribution packages
  # ════════════════════════════════════════════════════════════════════════════
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    needs: [lint, test]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Check distribution
        run: twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/


  # ════════════════════════════════════════════════════════════════════════════
  # Publish to PyPI on release
  # ════════════════════════════════════════════════════════════════════════════
  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'release' && github.event.action == 'published'
    environment:
      name: pypi
      url: https://pypi.org/p/sRNA-TAPS

    permissions:
      id-token: write   # required for trusted publishing

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
