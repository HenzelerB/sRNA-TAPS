name: sRNA-TAPS
channels:
  - bioconda
  - conda-forge
  - defaults
dependencies:
  # Python
  - python=3.11

  # Core bioinformatics tools
  - bowtie=1.3.1
  - samtools=1.20
  - bcftools=1.20
  - htslib=1.20
  - fastqc=0.12.1
  - trim-galore=0.6.10
  - multiqc=1.21
  - bismark=0.24.2

  # Workflow
  - snakemake>=9,<10
  - snakemake-executor-plugin-slurm>=2.7

  # Python packages
  - pip
  - pip:
    - rastair
    - astair
    - setuptools<72
