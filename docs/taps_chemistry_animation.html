<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TAPS Chemistry Animation</title>
<style>
  body { margin: 0; padding: 20px; background: transparent; font-family: 'Outfit', sans-serif; }
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap');
  @keyframes popIn{0%{transform:scale(0);opacity:0}70%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.6}}
  @keyframes glow{0%,100%{fill:#00d4aa}50%{fill:#36e8c8}}
  .cn1{transform-origin:80px 100px;animation:popIn 0.5s ease 0.3s both}
  .cn2{transform-origin:215px 100px;animation:popIn 0.5s ease 1.5s both}
  .cn3{transform-origin:360px 100px;animation:popIn 0.5s ease 2.8s both}
  .cn4{transform-origin:505px 100px;animation:popIn 0.5s ease 4.2s both}
  .cl1{animation:fadeIn 0.4s ease 1.1s both}
  .cl2{animation:fadeIn 0.4s ease 2.4s both}
  .cl3{animation:fadeIn 0.4s ease 3.8s both}
  .cresult{animation:fadeIn 0.6s ease 4.6s both}
  .cunmod{animation:fadeIn 0.6s ease 5.2s both}
  .cfloat{animation:float 3s ease-in-out infinite}
  .cpulse{animation:pulse 2.5s ease-in-out 1.8s infinite}
  .cglow{animation:glow 2s ease-in-out 4.5s infinite}
</style>
</head>
<body>
<svg width="100%" viewBox="0 0 680 230" role="img" xmlns="http://www.w3.org/2000/svg">
<title>TAPS chemistry</title>
<desc>m5C and hm5C oxidised by TET to 5caC, reduced by pyridine borane to DHU, read as T in PCR</desc>
<defs>
  <marker id="cma" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#2C5F8A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="cmb" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#00d4aa" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="cmc" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Node 1: m5C / hm5C -->
<g class="cn1 cfloat">
  <circle cx="80" cy="100" r="42" fill="#1a3a5c"/>
  <text x="80" y="91" text-anchor="middle" dominant-baseline="middle" fill="white" font-size="14" font-weight="700" font-family="Outfit,sans-serif">m&#x2075;C</text>
  <text x="80" y="103" text-anchor="middle" dominant-baseline="middle" fill="#8ab8d4" font-size="12" font-family="Outfit,sans-serif">/</text>
  <text x="80" y="115" text-anchor="middle" dominant-baseline="middle" fill="white" font-size="13" font-weight="700" font-family="Outfit,sans-serif">hm&#x2075;C</text>
</g>
<g class="cn1">
  <text x="80" y="153" text-anchor="middle" dominant-baseline="middle" fill="#888" font-size="10" font-family="Outfit,sans-serif">5-methyl /</text>
  <text x="80" y="165" text-anchor="middle" dominant-baseline="middle" fill="#888" font-size="10" font-family="Outfit,sans-serif">5-hydroxymethyl</text>
</g>

<!-- Arrow 1: TET -->
<g class="cl1">
  <line x1="126" y1="100" x2="172" y2="100" stroke="#2C5F8A" stroke-width="2" stroke-dasharray="46" stroke-dashoffset="46" marker-end="url(#cma)">
    <animate attributeName="stroke-dashoffset" from="46" to="0" dur="0.5s" begin="1.0s" fill="freeze"/>
  </line>
  <text x="147" y="85" text-anchor="middle" dominant-baseline="middle" fill="#2C5F8A" font-size="11" font-weight="600" font-family="Outfit,sans-serif">TET</text>
  <text x="147" y="73" text-anchor="middle" dominant-baseline="middle" fill="#2C5F8A" font-size="10" font-family="Outfit,sans-serif">oxidation</text>
</g>

<!-- Node 2: 5caC -->
<g class="cn2 cfloat cpulse">
  <circle cx="215" cy="100" r="42" fill="#2C5F8A"/>
  <text x="215" y="100" text-anchor="middle" dominant-baseline="middle" fill="white" font-size="16" font-weight="700" font-family="Outfit,sans-serif">5caC</text>
</g>
<g class="cn2">
  <text x="215" y="153" text-anchor="middle" dominant-baseline="middle" fill="#888" font-size="10" font-family="Outfit,sans-serif">5-carboxyl-</text>
  <text x="215" y="165" text-anchor="middle" dominant-baseline="middle" fill="#888" font-size="10" font-family="Outfit,sans-serif">cytosine</text>
</g>

<!-- Arrow 2: Pyridine borane -->
<g class="cl2">
  <line x1="261" y1="100" x2="317" y2="100" stroke="#00d4aa" stroke-width="2" stroke-dasharray="56" stroke-dashoffset="56" marker-end="url(#cmb)">
    <animate attributeName="stroke-dashoffset" from="56" to="0" dur="0.5s" begin="2.3s" fill="freeze"/>
  </line>
  <text x="289" y="85" text-anchor="middle" dominant-baseline="middle" fill="#00d4aa" font-size="11" font-weight="600" font-family="Outfit,sans-serif">Pyridine</text>
  <text x="289" y="73" text-anchor="middle" dominant-baseline="middle" fill="#00d4aa" font-size="10" font-family="Outfit,sans-serif">borane</text>
</g>

<!-- Node 3: DHU -->
<g class="cn3 cfloat cpulse">
  <circle cx="360" cy="100" r="42" fill="#1a6b6e"/>
  <text x="360" y="100" text-anchor="middle" dominant-baseline="middle" fill="white" font-size="16" font-weight="700" font-family="Outfit,sans-serif">DHU</text>
</g>
<g class="cn3">
  <text x="360" y="153" text-anchor="middle" dominant-baseline="middle" fill="#888" font-size="10" font-family="Outfit,sans-serif">dihydro-</text>
  <text x="360" y="165" text-anchor="middle" dominant-baseline="middle" fill="#888" font-size="10" font-family="Outfit,sans-serif">uracil</text>
</g>

<!-- Arrow 3: PCR -->
<g class="cl3">
  <line x1="406" y1="100" x2="461" y2="100" stroke="#888" stroke-width="2" stroke-dasharray="55" stroke-dashoffset="55" marker-end="url(#cmc)">
    <animate attributeName="stroke-dashoffset" from="55" to="0" dur="0.5s" begin="3.7s" fill="freeze"/>
  </line>
  <text x="433" y="85" text-anchor="middle" dominant-baseline="middle" fill="#888" font-size="11" font-weight="600" font-family="Outfit,sans-serif">PCR</text>
  <text x="433" y="73" text-anchor="middle" dominant-baseline="middle" fill="#888" font-size="10" font-family="Outfit,sans-serif">amplification</text>
</g>

<!-- Node 4: T -->
<g class="cn4 cfloat cglow">
  <circle cx="505" cy="100" r="42" fill="#00d4aa"/>
  <text x="505" y="100" text-anchor="middle" dominant-baseline="middle" fill="#0a2a1a" font-size="30" font-weight="700" font-family="Outfit,sans-serif">T</text>
</g>
<g class="cn4">
  <text x="505" y="153" text-anchor="middle" dominant-baseline="middle" fill="#888" font-size="10" font-family="Outfit,sans-serif">read as thymine</text>
</g>

<!-- C→T badge -->
<g class="cresult">
  <rect x="578" y="78" width="84" height="44" rx="8" fill="none" stroke="#2C5F8A" stroke-width="1.5"/>
  <text x="593" y="100" text-anchor="middle" dominant-baseline="middle" fill="#2C5F8A" font-size="20" font-weight="700" font-family="Outfit,sans-serif">C</text>
  <text x="620" y="100" text-anchor="middle" dominant-baseline="middle" fill="#888" font-size="14" font-family="Outfit,sans-serif">&#x2192;</text>
  <text x="647" y="100" text-anchor="middle" dominant-baseline="middle" fill="#00d4aa" font-size="20" font-weight="700" font-family="Outfit,sans-serif">T</text>
  <text x="620" y="134" text-anchor="middle" dominant-baseline="middle" fill="#888" font-size="10" font-family="Outfit,sans-serif">modified only</text>
</g>

<!-- Unmodified C note -->
<g class="cunmod">
  <line x1="40" y1="200" x2="640" y2="200" stroke="#333" stroke-width="0.5" stroke-dasharray="4,4"/>
  <text x="340" y="218" text-anchor="middle" dominant-baseline="middle" fill="#555" font-size="11" font-family="Outfit,sans-serif">Unmodified cytosine (C) is not affected by TAPS chemistry &#x2014; it remains as C in sequencing reads</text>
</g>

</svg>
</body>
</html>
